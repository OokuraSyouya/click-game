<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">
  <title>クリックゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<div class="container">

  <h1>クリックゲーム</h1>

  <p>スコア：<span id="score">0</span></p>
  <p>ハイスコア：<span id="highScore">0</span></p>
<p>累計スコア：<span id="totalScore">0</span></p>
<p>レベル：<span id="level">1</span></p>
  <p>残り時間：<span id="time">10</span> 秒</p>

  <button id="clickButton">クリック！</button>

<!-- ★ リスタートボタン（最初は非表示） -->
<button id="restartButton" style="display:none;">
  リスタート
</button>

<button id="resetButton">
  データをリセット
</button>


</div>


  <!-- JavaScriptを読み込む（超重要） -->
  <script src="script.js"></script>

</body>
</html>
